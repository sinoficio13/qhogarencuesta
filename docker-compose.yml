services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qhogar
      POSTGRES_PASSWORD: qhogar
      POSTGRES_DB: qhogar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/01-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qhogar"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
